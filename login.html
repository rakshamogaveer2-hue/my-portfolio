<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0a0a0f;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .noise {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
  }
  .glow {
    position: fixed; width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(99,57,255,0.15) 0%, transparent 70%);
    top: -200px; left: -100px; pointer-events: none; z-index: 0;
  }
  .glow2 {
    position: fixed; width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(255,80,120,0.08) 0%, transparent 70%);
    bottom: 0; right: -100px; pointer-events: none; z-index: 0;
  }
  .box {
    position: relative; z-index: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    margin: 24px;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(99,57,255,0.15); border: 1px solid rgba(99,57,255,0.3);
    color: #a78bfa; font-size: 12px; font-weight: 500; letter-spacing: 0.08em;
    padding: 6px 14px; border-radius: 100px; margin-bottom: 28px;
    text-transform: uppercase;
  }
  .dot { width: 6px; height: 6px; background: #a78bfa; border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 6px;
  }
  .name-accent { color: #7c3aed; }
  .sub {
    font-size: 14px;
    color: rgba(255,255,255,0.35);
    font-weight: 300;
    margin-bottom: 36px;
  }
  label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 8px;
    font-weight: 500;
  }
  input[type="password"] {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px 16px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 12px;
  }
  input[type="password"]:focus {
    border-color: rgba(124,58,237,0.6);
    background: rgba(124,58,237,0.08);
  }
  input[type="password"]::placeholder { color: rgba(255,255,255,0.2); }
  button {
    width: 100%;
    background: #7c3aed;
    border: none;
    border-radius: 12px;
    padding: 14px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.2s, transform 0.1s;
    margin-top: 4px;
  }
  button:hover { background: #6d28d9; }
  button:active { transform: scale(0.98); }
  .error {
    display: none;
    margin-top: 14px;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.25);
    color: #fca5a5;
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 10px;
    text-align: center;
  }
  .error.show { display: block; }
  .hint {
    margin-top: 24px;
    font-size: 12px;
    color: rgba(255,255,255,0.2);
    text-align: center;
  }
</style>
</head>
<body>
<div class="noise"></div>
<div class="glow"></div>
<div class="glow2"></div>

<div class="box">
  <div class="badge"><span class="dot"></span> Private Portfolio</div>
  <h1><span class="name-accent">Raksha</span>'s<br>Portfolio</h1>
  <p class="sub">Enter password to continue</p>

  <label>Password</label>
  <input type="password" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()">
  <button onclick="login()">Enter →</button>
  <div class="error" id="err">Wrong password. Try again.</div>
  <p class="hint">Contact Raksha to get access</p>
</div>

<script>
  const PASSWORD = "raksha123";

  function login() {
    const val = document.getElementById('pwd').value;
    const err = document.getElementById('err');
    if (val === PASSWORD) {
      window.location.href = "index.html";
    } else {
      err.classList.add('show');
      document.getElementById('pwd').value = '';
      document.getElementById('pwd').focus();
    }
  }
</script>
</body>
</html>
